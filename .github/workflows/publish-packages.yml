# Publish krabby-* packages to PyPI on version tags.
# Tag format: <package-prefix>-v<version> (e.g. hal-client-v0.1.0, controller-v0.1.0).
# Version is derived from the tag and written into the package's pyproject.toml before build.
# Runs tests for the package before uploading. Install internal krabby-* deps from repo wheels.
# Requires: PYPI_API_TOKEN in repo secrets (or configure Trusted Publishing).

name: Publish packages to PyPI

on:
  push:
    tags:
      - 'hal-client-v*'
      - 'hal-server-v*'
      - 'compute-parkour-v*'
      - 'controller-v*'
      - 'hal-tools-v*'
      - 'hal-server-isaac-v*'
      - 'hal-server-jetson-v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build and publish tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine wheel setuptools

      - name: Determine package from tag
        id: pkg
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          echo "version=${TAG#*-v}" >> $GITHUB_OUTPUT
          if [[ "$TAG" == hal-server-isaac-v* ]]; then
            echo "pkg_key=hal-server-isaac" >> $GITHUB_OUTPUT
            echo "path=hal/server/isaac" >> $GITHUB_OUTPUT
            echo "deps=hal/client hal/server compute/parkour" >> $GITHUB_OUTPUT
            echo "test_path=tests/unit/hal/server/isaac/" >> $GITHUB_OUTPUT
            echo "build_self_first=" >> $GITHUB_OUTPUT
          elif [[ "$TAG" == hal-server-jetson-v* ]]; then
            echo "pkg_key=hal-server-jetson" >> $GITHUB_OUTPUT
            echo "path=hal/server/jetson" >> $GITHUB_OUTPUT
            echo "deps=hal/client hal/server compute/parkour" >> $GITHUB_OUTPUT
            echo "test_path=tests/unit/hal/" >> $GITHUB_OUTPUT
            echo "build_self_first=" >> $GITHUB_OUTPUT
          elif [[ "$TAG" == hal-client-v* ]]; then
            echo "pkg_key=hal-client" >> $GITHUB_OUTPUT
            echo "path=hal/client" >> $GITHUB_OUTPUT
            echo "deps=hal/server compute/parkour" >> $GITHUB_OUTPUT
            echo "test_path=tests/unit/hal/" >> $GITHUB_OUTPUT
            echo "build_self_first=hal/client" >> $GITHUB_OUTPUT
          elif [[ "$TAG" == hal-server-v* ]]; then
            echo "pkg_key=hal-server" >> $GITHUB_OUTPUT
            echo "path=hal/server" >> $GITHUB_OUTPUT
            echo "deps=" >> $GITHUB_OUTPUT
            echo "test_path=tests/unit/hal/test_server.py tests/unit/hal/test_zmq_push_pull.py" >> $GITHUB_OUTPUT
            echo "build_self_first=" >> $GITHUB_OUTPUT
          elif [[ "$TAG" == compute-parkour-v* ]]; then
            echo "pkg_key=compute-parkour" >> $GITHUB_OUTPUT
            echo "path=compute/parkour" >> $GITHUB_OUTPUT
            echo "deps=hal/client" >> $GITHUB_OUTPUT
            echo "test_path=tests/unit/test_compute_parkour_policy.py" >> $GITHUB_OUTPUT
            echo "build_self_first=" >> $GITHUB_OUTPUT
          elif [[ "$TAG" == controller-v* ]]; then
            echo "pkg_key=controller" >> $GITHUB_OUTPUT
            echo "path=controller" >> $GITHUB_OUTPUT
            echo "deps=hal/client" >> $GITHUB_OUTPUT
            echo "test_path=tests/unit/controller/" >> $GITHUB_OUTPUT
            echo "build_self_first=" >> $GITHUB_OUTPUT
          elif [[ "$TAG" == hal-tools-v* ]]; then
            echo "pkg_key=hal-tools" >> $GITHUB_OUTPUT
            echo "path=hal/tools" >> $GITHUB_OUTPUT
            echo "deps=hal/client hal/server" >> $GITHUB_OUTPUT
            echo "test_path=" >> $GITHUB_OUTPUT
            echo "build_self_first=" >> $GITHUB_OUTPUT
          else
            echo "Unrecognized tag: $TAG"
            exit 1
          fi

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: publish-pip-${{ runner.os }}-py312-${{ steps.pkg.outputs.pkg_key }}

      - name: Build and install dependency wheels
        run: |
          if [[ -n "${{ steps.pkg.outputs.build_self_first }}" ]]; then
            echo "Building and installing ${{ steps.pkg.outputs.build_self_first }} first..."
            cd "${{ steps.pkg.outputs.build_self_first }}" && python -m build --wheel --no-isolation && pip install dist/*.whl && cd ../..
          fi
          for dep in ${{ steps.pkg.outputs.deps }}; do
            if [[ -n "$dep" ]]; then
              echo "Building and installing $dep..."
              cd "$dep" && python -m build --wheel --no-isolation && pip install dist/*.whl && cd ../..
            fi
          done

      - name: Set package version from tag
        run: |
          VERSION="${{ steps.pkg.outputs.version }}"
          PATH_PKG="${{ steps.pkg.outputs.path }}"
          sed -i 's/^version = ".*"/version = "'"$VERSION"'"/' "$PATH_PKG/pyproject.toml"

      - name: Build package wheel
        run: |
          cd "${{ steps.pkg.outputs.path }}"
          python -m build --wheel --no-isolation

      - name: Install package and dev deps for testing
        run: |
          cd "${{ steps.pkg.outputs.path }}"
          pip install dist/*.whl
          pip install pytest pytest-cov pytest-timeout keyboard pyserial
          PKG_KEY="${{ steps.pkg.outputs.pkg_key }}"
          if [[ "$PKG_KEY" == hal-server-isaac ]] || [[ "$PKG_KEY" == hal-server-jetson ]] || [[ "$PKG_KEY" == compute-parkour ]] || [[ "$PKG_KEY" == hal-client ]] || [[ "$PKG_KEY" == controller ]]; then
            pip install torch --index-url https://download.pytorch.org/whl/cpu
            pip install scipy
            pip install pyyaml
            pip install rsl-rl-lib==3.1.2
          fi
          cd -

      - name: Run tests
        if: steps.pkg.outputs.test_path != ''
        run: |
          pytest ${{ steps.pkg.outputs.test_path }} -v --timeout=60 --timeout-method=thread

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          twine upload "${{ steps.pkg.outputs.path }}/dist/"*.whl
