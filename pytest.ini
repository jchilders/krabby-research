[pytest]
# Pytest configuration
pythonpath = .
# Show debug logs when running tests (e.g. HAL client poll/recv tracing when set_debug(True))
log_cli_level = DEBUG
filterwarnings =
    # pygame still uses setuptools pkg_resources (deprecated); not our code — see setuptools release notes
    ignore:pkg_resources is deprecated as an API:UserWarning:pygame.pkgdata
markers =
    jetson: Tests for Jetson stack (HAL, ZED, MaixSense, etc.; mocked or hardware)
    isaacsim: Tests that require Isaac Sim environment (including real model inference)

