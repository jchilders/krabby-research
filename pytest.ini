[pytest]
# Pytest configuration
pythonpath = .
# Show debug logs when running tests (e.g. HAL client poll/recv tracing when set_debug(True))
log_cli_level = DEBUG
markers =
    jetson: Tests for Jetson stack (HAL, ZED, MaixSense, etc.; mocked or hardware)
    isaacsim: Tests that require Isaac Sim environment (including real model inference)

